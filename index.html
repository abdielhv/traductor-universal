<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Traductor Universal de Datos</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>

body{
background:#070b12;
color:white;
font-family:'Inter',sans-serif;
margin:0;
padding:0;
}

.container{
max-width:900px;
margin:auto;
padding:40px;
}

h1{
font-size:46px;
margin-bottom:10px;
}

.highlight{
color:#33e0ff;
}

.subtitle{
color:#9fb3c8;
margin-bottom:30px;
}

.panel{
background:#0f1624;
border-radius:12px;
padding:20px;
margin-bottom:20px;
}

input[type="file"],
input[type="text"]{
width:100%;
padding:10px;
margin-top:6px;
background:#0c1320;
border:1px solid #263247;
color:white;
border-radius:6px;
}

button{
background:#2de3ff;
color:#002433;
border:none;
padding:12px 20px;
border-radius:6px;
font-weight:bold;
cursor:pointer;
margin-top:20px;
}

button:hover{
background:#52ecff;
}

.result{
margin-top:30px;
background:#050a13;
padding:20px;
border-radius:8px;
font-size:13px;
overflow:auto;
max-height:400px;
}

</style>

</head>

<body>

<div class="container">

<h1>Motor de <span class="highlight">Inteligencia</span> de Datos</h1>

<div class="subtitle">
Sube cualquier archivo. La IA extrae, mapea y consolida.
</div>

<div class="panel">
<label>Gemini API Key</label>
<input id="apiKey" placeholder="AIza...">
</div>

<div class="panel">
<label>Archivo Origen</label>
<input type="file" id="src">
</div>

<div class="panel">
<label>Plantilla Destino</label>
<input type="file" id="dst">
</div>

<button onclick="runTranslation()">Ejecutar Traducción Universal</button>

<div class="result" id="output"></div>

</div>

<script>

const files={src:null,dst:null}

document.getElementById("src").onchange=e=>files.src=e.target.files[0]
document.getElementById("dst").onchange=e=>files.dst=e.target.files[0]

function getGeminiURL(){
return "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent"
}

async function callGemini(prompt){

const key=document.getElementById("apiKey").value.trim()

const url=`${getGeminiURL()}?key=${key}`

const res=await fetch(url,{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
contents:[{parts:[{text:prompt}]}]
})
})

const data=await res.json()

if(data.error) throw new Error(data.error.message)

return data.candidates?.[0]?.content?.parts?.[0]?.text||""

}

async function extractText(file){

const ext=file.name.split(".").pop().toLowerCase()

if(ext==="csv"||ext==="txt") return file.text()

if(ext==="docx"){
const ab=await file.arrayBuffer()
const r=await mammoth.extractRawText({arrayBuffer:ab})
return r.value
}

if(ext==="xlsx"||ext==="xls"){
const ab=await file.arrayBuffer()
const wb=XLSX.read(ab,{type:"array"})
let result=""
wb.SheetNames.forEach(name=>{
const sheet=wb.Sheets[name]
result+=XLSX.utils.sheet_to_csv(sheet)+"\n"
})
return result
}

if(ext==="pdf"){
const ab=await file.arrayBuffer()
const pdf=await pdfjsLib.getDocument({data:ab}).promise
let text=""
for(let i=1;i<=Math.min(pdf.numPages,10);i++){
const page=await pdf.getPage(i)
const content=await page.getTextContent()
text+=content.items.map(x=>x.str).join(" ")+"\n"
}
return text
}

return file.text()

}

async function runTranslation(){

const out=document.getElementById("output")

try{

if(!files.src||!files.dst){
out.textContent="Debes subir archivo origen y plantilla destino."
return
}

const srcText=await extractText(files.src)
const dstText=await extractText(files.dst)

const prompt=`
Mapea campos entre ORIGEN y DESTINO.

ORIGEN:
${srcText.slice(0,2500)}

DESTINO:
${dstText.slice(0,1500)}

Responde SOLO JSON:

{
"mapeo":[
{
"origen":"",
"destino":"",
"valor_real":"",
"confianza":0,
"razon":""
}
]
}
`

const raw=await callGemini(prompt)

let clean=raw.replace(/```json/g,'').replace(/```/g,'').trim()

const jsonMatch=clean.match(/\{[\s\S]*\}/)

if(!jsonMatch) throw new Error("La IA no devolvió JSON válido")

const parsed=JSON.parse(jsonMatch[0])

out.textContent=JSON.stringify(parsed,null,2)

}catch(e){

out.textContent="Error: "+e.message

}

}

</script>

</body>
</html>
