<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Traductor Universal de Datos</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>
body{
background:#080c12;
color:#e8f0fe;
font-family:sans-serif;
padding:40px
}
button{
padding:10px 20px;
margin-top:10px
}
input{
margin-bottom:10px
}
</style>

</head>
<body>

<h2>Traductor Universal de Datos</h2>

API Key<br>
<input id="apiKey" placeholder="AIza..." style="width:400px"><br><br>

Archivo origen<br>
<input type="file" id="src"><br><br>

Plantilla destino<br>
<input type="file" id="dst"><br><br>

<button onclick="runTranslation()">Ejecutar Traducción</button>

<pre id="output"></pre>

<script>

const files={src:null,dst:null}

document.getElementById("src").onchange=e=>files.src=e.target.files[0]
document.getElementById("dst").onchange=e=>files.dst=e.target.files[0]

function getGeminiURL(){
return "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent"
}

async function callGemini(prompt){

const key=document.getElementById("apiKey").value.trim()

const url=`${getGeminiURL()}?key=${key}`

const res=await fetch(url,{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
contents:[{parts:[{text:prompt}]}]
})
})

const data=await res.json()

if(data.error) throw new Error(data.error.message)

return data.candidates?.[0]?.content?.parts?.[0]?.text||""

}

async function extractText(file){

const ext=file.name.split(".").pop().toLowerCase()

if(ext==="csv"||ext==="txt") return file.text()

if(ext==="docx"){
const ab=await file.arrayBuffer()
const r=await mammoth.extractRawText({arrayBuffer:ab})
return r.value
}

if(ext==="xlsx"||ext==="xls"){

const ab=await file.arrayBuffer()

const wb=XLSX.read(ab,{type:"array"})

let result=""

wb.SheetNames.forEach(name=>{
const sheet=wb.Sheets[name]
result+=XLSX.utils.sheet_to_csv(sheet)+"\n"
})

return result

}

return file.text()

}

async function runTranslation(){

const out=document.getElementById("output")

try{

const srcText=await extractText(files.src)
const dstText=await extractText(files.dst)

const prompt=`
Mapea campos entre ORIGEN y DESTINO.

ORIGEN:
${srcText.slice(0,2500)}

DESTINO:
${dstText.slice(0,1500)}

Responde SOLO JSON:

{
"mapeo":[
{
"origen":"",
"destino":"",
"valor_real":"",
"confianza":0,
"razon":""
}
]
}
`

const raw=await callGemini(prompt)

let clean=raw.replace(/```json/g,'').replace(/```/g,'').trim()

const jsonMatch=clean.match(/\{[\s\S]*\}/)

if(!jsonMatch) throw new Error("JSON no detectado")

const parsed=JSON.parse(jsonMatch[0])

out.textContent=JSON.stringify(parsed,null,2)

}catch(e){

out.textContent="Error: "+e.message

}

}

</script>

</body>
</html>
